name: JS Syntax Check

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          find js worker -name '*.js' | sort | while read f; do
            node --check "$f" && echo "OK  $f" || exit 1
          done
