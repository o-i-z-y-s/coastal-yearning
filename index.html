<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#312678">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; script-src 'self'; connect-src 'self' https://api.jordanfluitt.com; object-src 'none'">
  <title>Jordan Fluitt</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="preload" href="./fonts/Montserrat-Bold.woff"   as="font" type="font/woff" crossorigin>
  <link rel="preload" href="./fonts/Montserrat-SemiBold.woff" as="font" type="font/woff" crossorigin>
  <link rel="preload" href="./fonts/Montserrat-Medium.woff"   as="font" type="font/woff" crossorigin>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>

  <!-- No-JS fallback: hidden when JavaScript runs; shown when it does not -->
  <noscript>
    <style>
      #clock-scrubber, .time-toggle, #sky-hero,
      #ocean, #footer, #theme-overlay { display: none !important; }

      .noscript-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 3rem 2rem;
        background: linear-gradient(to bottom,
          rgb(0,22,98)    -10%,
          rgb(10,70,168)   20%,
          rgb(85,145,208)  60%,
          rgb(148,192,226) 82%,
          rgb(220,242,255) 140%
        );
        text-align: center;
        font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
        gap: 0;
      }
      .noscript-name {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.4rem;
      }
      .noscript-tagline {
        font-size: 1rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.05em;
        margin-bottom: 1.75rem;
      }
      .noscript-bio {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.55);
        max-width: 420px;
        line-height: 1.75;
        margin-bottom: 2rem;
      }
      .noscript-links {
        display: flex;
        gap: 0.25rem;
        justify-content: center;
        margin-bottom: 3rem;
      }
      .noscript-links a {
        display: inline-flex;
        padding: 10px 16px;
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        transition: color 0.2s, border-color 0.2s;
      }
      .noscript-links a:hover { color: #fff; border-color: rgba(255, 255, 255, 0.5); }
      .noscript-note {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.55);
        font-style: italic;
        letter-spacing: 0.04em;
      }
    </style>
    <div class="noscript-page">
      <h1 class="noscript-name">Jordan Fluitt</h1>
      <p class="noscript-tagline">Technical program manager. Senior software engineer.</p>
      <p class="noscript-bio">I run R&D programs and write the software inside them. Most people pick one.</p>
      <nav class="noscript-links">
        <a href="https://github.com/o-i-z-y-s">GitHub</a>
        <a href="https://www.linkedin.com/in/jordan-fluitt/">LinkedIn</a>
        <a href="mailto:jordanf.tpm@gmail.com">Email</a>
      </nav>
      <p class="noscript-note">Please enable JavaScript for the full website experience.</p>
    </div>
  </noscript>

  <!-- Time controls: toggle + clock scrubber, centered as a column -->
  <div id="time-controls">
    <button id="controls-toggle" title="Time controls" aria-label="Toggle time controls" aria-expanded="false">
      <svg width="16" height="16" viewBox="0 0 13 13" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <line x1="6.5" y1="6.5" x2="6.5" y2="3.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="6.5" y1="6.5" x2="9.2" y2="6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="controls-panel">
    <div class="time-toggle">
      <button class="time-btn" data-time="dawn" title="Dawn">
        <img src="./assets/halfsunhalfmoon.png" alt="Dawn" class="img-flip">
      </button>
      <button class="time-btn" data-time="morning" title="Day">
        <img src="./assets/sun.png" alt="Day">
      </button>
      <button class="time-btn" data-time="evening" title="Dusk">
        <img src="./assets/halfsunhalfmoon.png" alt="Dusk">
      </button>
      <button class="time-btn" data-time="night" title="Night">
        <img src="./assets/moon.png" alt="Night">
      </button>
    </div>
    <button id="scrubber-toggle" title="Hide clock">
      <svg class="toggle-clock-icon" width="13" height="13" viewBox="0 0 13 13" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <line x1="6.5" y1="6.5" x2="6.5" y2="3.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="6.5" y1="6.5" x2="9.2" y2="6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span class="toggle-label">Clock</span>
      <svg class="toggle-arrow" width="10" height="10" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polyline points="1.5,3 5,7.5 8.5,3" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="clock-scrubber">
      <canvas id="clock-canvas" width="140" height="140"></canvas>
      <div id="scrubber-date"></div>
      <button id="scrubber-restore">Restore</button>
    </div>
    </div><!-- /#controls-panel -->
  </div>

  <!-- Sky hero: full viewport -->
  <section id="sky-hero">
    <canvas id="gradient-canvas"></canvas>
    <canvas id="sky-canvas"></canvas>
    <div id="sun"></div>
    <canvas id="moon-occluder" width="70" height="70"></canvas>
    <canvas id="moon-canvas" width="70" height="70"></canvas>

    <div id="hero-content">
      <h1 id="hero-name"></h1>
      <p  id="hero-tagline"></p>
      <div id="hero-icons"></div>
    </div>

    <!-- Water surface haze: stronger at the waterline, fades upward -->
    <div id="sky-surface"></div>

    <div class="scroll-cue" aria-hidden="true">
      <span class="chevron"></span>
      <span class="chevron"></span>
    </div>

    <!-- Two animated wave layers: back is slower and dimmer -->
    <div id="wave-divider">
      <svg class="wave-svg wave-svg--back" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2880 80" preserveAspectRatio="none">
        <path class="wave-path"
          d="M0,55 C360,20 540,72 720,48 C900,72 1080,18 1440,55 C1620,20 1800,72 2160,48 C2340,72 2520,18 2880,55 L2880,80 L0,80 Z"
          fill="#0e1245"/>
      </svg>
      <svg class="wave-svg wave-svg--front" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2880 80" preserveAspectRatio="none">
        <path class="wave-path"
          d="M0,50 C180,12 420,72 720,50 C1020,28 1260,72 1440,50 C1620,12 1860,72 2160,50 C2460,28 2700,72 2880,50 L2880,80 L0,80 Z"
          fill="#0e1245"/>
      </svg>
    </div>
  </section>

  <!-- Ocean: scroll down to dive in -->
  <section id="ocean">
    <canvas id="bubbles-canvas"></canvas>

    <div class="ocean-content">

      <p id="ocean-bio" class="ocean-bio"></p>

      <div id="status-cards" class="card-row"></div>

      <div class="ocean-divider"></div>

      <div class="ocean-section">
        <div class="section-label">Projects</div>
        <div id="project-cards" class="card-row"></div>
      </div>

      <div class="ocean-divider"></div>

      <div class="ocean-section">
        <div class="section-label">Also</div>
        <div id="also-cards" class="card-row"></div>
      </div>

    </div>
  </section>

  <footer id="footer">
    <span id="footer-text"></span>
  </footer>

  <!-- Theme crossfade overlay -->
  <div id="theme-overlay"></div>

  <script src="./js/astronomy.js"></script>
  <script src="./js/particles.js"></script>
  <script src="./js/planets.js"></script>
  <script src="./js/content.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
